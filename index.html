<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MisFinanzas</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --income: #22d3a5;
    --expense: #ff6b6b;
    --accent: #7c83ff;
    --text: #e8eaf6;
    --muted: #7b82a8;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* NAV */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 0; position: sticky; top: 0; z-index: 100; }
  .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem; color: var(--accent); padding: 16px 0; margin-right: auto; }
  .nav-logo span { color: var(--income); }
  .nav-btn { background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 20px 16px; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
  .nav-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .nav-btn:hover { color: var(--text); }

  /* PAGES */
  .page { display: none; padding: 28px 24px; max-width: 900px; margin: 0 auto; }
  .page.active { display: block; }

  /* RESUMEN */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .card-value { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 700; }
  .card-value.green { color: var(--income); }
  .card-value.red { color: var(--expense); }
  .card-value.blue { color: var(--accent); }

  /* RECENT */
  .section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 14px; color: var(--text); }
  .tx-list { display: flex; flex-direction: column; gap: 8px; }
  .tx-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
  .tx-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .tx-dot.income { background: var(--income); }
  .tx-dot.expense { background: var(--expense); }
  .tx-info { flex: 1; }
  .tx-cat { font-size: 0.85rem; font-weight: 500; }
  .tx-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .tx-date { font-size: 0.75rem; color: var(--muted); }
  .tx-amount { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 1rem; }
  .tx-amount.income { color: var(--income); }
  .tx-amount.expense { color: var(--expense); }
  .tx-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 4px; border-radius: 6px; transition: color .15s; }
  .tx-del:hover { color: var(--expense); }
  .empty { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 32px; }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1/-1; }
  label { font-size: 0.8rem; color: var(--muted); }
  select, input[type="number"], input[type="text"], input[type="date"] {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none;
    transition: border-color .2s;
  }
  select:focus, input:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  .btn-submit { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 12px 28px;
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: opacity .2s; }
  .btn-submit:hover { opacity: .85; }
  .btn-submit.expense-btn { background: var(--expense); }
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 28px; }
  .form-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; margin-bottom: 18px; }
  .form-title.income { color: var(--income); }
  .form-title.expense { color: var(--expense); }

  /* CHARTS */
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .chart-title { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 220px; }

  /* HISTORIAL filters */
  .filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; align-items: center; }
  .filter-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 20px;
    padding: 6px 16px; font-size: 0.82rem; cursor: pointer; transition: all .2s; }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-btn.income-f.active { background: var(--income); border-color: var(--income); }
  .filter-btn.expense-f.active { background: var(--expense); border-color: var(--expense); }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 12px 20px; border-radius: 10px; font-size: 0.85rem;
    opacity: 0; transform: translateY(10px); transition: all .3s; pointer-events: none; z-index: 999; }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* MONTH PICKER */
  .month-row { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .month-row label { font-size: 0.82rem; color: var(--muted); }
  .month-row input[type="month"] { background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 7px 12px; font-size: 0.85rem; outline: none; font-family: 'DM Sans', sans-serif; }
  .month-row input[type="month"]:focus { border-color: var(--accent); }

  @media(max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .chart-grid { grid-template-columns: 1fr; }
    nav { gap: 0; }
    .nav-btn { padding: 18px 10px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Mis<span>Finanzas</span></div>
  <button class="nav-btn active" onclick="showPage('resumen')">Resumen</button>
  <button class="nav-btn" onclick="showPage('registrar')">Registrar</button>
  <button class="nav-btn" onclick="showPage('historial')">Historial</button>
  <button class="nav-btn" onclick="showPage('graficos')">Gráficos</button>
</nav>

<!-- RESUMEN -->
<div id="page-resumen" class="page active">
  <div class="month-row">
    <label>Mes:</label>
    <input type="month" id="resumen-month" onchange="renderResumen()">
  </div>
  <div class="cards">
    <div class="card"><div class="card-label">Total Ingresos</div><div class="card-value green" id="r-ingresos">$0.00</div></div>
    <div class="card"><div class="card-label">Total Gastos</div><div class="card-value red" id="r-gastos">$0.00</div></div>
    <div class="card"><div class="card-label">Balance</div><div class="card-value blue" id="r-balance">$0.00</div></div>
  </div>
  <div class="section-title">Últimos movimientos</div>
  <div class="tx-list" id="recent-list"></div>
</div>

<!-- REGISTRAR -->
<div id="page-registrar" class="page">
  <!-- Ingreso -->
  <div class="form-card">
    <div class="form-title income">+ Registrar Ingreso</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Categoría</label>
        <select id="i-cat">
          <option value="Viaje">Ingreso de Viaje</option>
          <option value="Viáticos">Ingreso de Viáticos</option>
          <option value="Propinas">Propinas</option>
          <option value="PC">Ingresos de PC</option>
          <option value="Salario">Salario</option>
          <option value="Otros Ingresos">Otros Ingresos</option>
        </select>
      </div>
      <div class="form-group">
        <label>Monto ($)</label>
        <input type="number" id="i-amount" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="i-date">
      </div>
      <div class="form-group">
        <label>Descripción (opcional)</label>
        <input type="text" id="i-desc" placeholder="Ej: pago semana 1">
      </div>
    </div>
    <br>
    <button class="btn-submit" onclick="saveTransaction('income')">Guardar Ingreso</button>
  </div>

  <!-- Gasto -->
  <div class="form-card">
    <div class="form-title expense">– Registrar Gasto</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Categoría</label>
        <select id="e-cat">
          <option value="Alimentación">Alimentación del Hogar</option>
          <option value="Transporte">Transporte</option>
          <option value="Combustible">Combustible</option>
          <option value="Facturas">Facturas / Servicios</option>
          <option value="Colegio">Colegio</option>
          <option value="Niñera">Niñera</option>
          <option value="Vestimenta">Vestimenta</option>
          <option value="Salidas">Salidas / Entretenimiento</option>
          <option value="Otros Gastos">Otros Gastos</option>
        </select>
      </div>
      <div class="form-group">
        <label>Monto ($)</label>
        <input type="number" id="e-amount" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="e-date">
      </div>
      <div class="form-group">
        <label>Descripción (opcional)</label>
        <input type="text" id="e-desc" placeholder="Ej: compra supermercado">
      </div>
    </div>
    <br>
    <button class="btn-submit expense-btn" onclick="saveTransaction('expense')">Guardar Gasto</button>
  </div>
</div>

<!-- HISTORIAL -->
<div id="page-historial" class="page">
  <div class="month-row">
    <label>Mes:</label>
    <input type="month" id="hist-month" onchange="renderHistorial()">
  </div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">Todos</button>
    <button class="filter-btn income-f" onclick="setFilter('income', this)">Ingresos</button>
    <button class="filter-btn expense-f" onclick="setFilter('expense', this)">Gastos</button>
  </div>
  <div class="tx-list" id="hist-list"></div>
</div>

<!-- GRAFICOS -->
<div id="page-graficos" class="page">
  <div class="month-row">
    <label>Mes:</label>
    <input type="month" id="chart-month" onchange="renderCharts()">
  </div>
  <div class="chart-grid">
    <div class="chart-card">
      <div class="chart-title" style="color:var(--income)">Ingresos por Categoría</div>
      <div class="chart-wrap"><canvas id="chart-income"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title" style="color:var(--expense)">Gastos por Categoría</div>
      <div class="chart-wrap"><canvas id="chart-expense"></canvas></div>
    </div>
    <div class="chart-card" style="grid-column:1/-1">
      <div class="chart-title" style="color:var(--accent)">Ingresos vs Gastos</div>
      <div class="chart-wrap"><canvas id="chart-compare"></canvas></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ---------- DATA ----------
function getData() { return JSON.parse(localStorage.getItem('mf_data') || '[]'); }
function saveData(d) { localStorage.setItem('mf_data', JSON.stringify(d)); }

function todayStr() { return new Date().toISOString().slice(0, 10); }
function thisMonth() { return new Date().toISOString().slice(0, 7); }
function fmt(n) { return '$' + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function fmtDate(d) {
  const [y,m,day] = d.split('-'); 
  return `${day}/${m}/${y}`;
}

// ---------- INIT ----------
document.getElementById('resumen-month').value = thisMonth();
document.getElementById('hist-month').value = thisMonth();
document.getElementById('chart-month').value = thisMonth();
document.getElementById('i-date').value = todayStr();
document.getElementById('e-date').value = todayStr();

// ---------- NAVIGATION ----------
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  event.currentTarget.classList.add('active');
  if(id === 'resumen') renderResumen();
  if(id === 'historial') renderHistorial();
  if(id === 'graficos') renderCharts();
}

// ---------- SAVE ----------
function saveTransaction(type) {
  const isIncome = type === 'income';
  const cat   = document.getElementById(isIncome ? 'i-cat' : 'e-cat').value;
  const amount= parseFloat(document.getElementById(isIncome ? 'i-amount' : 'e-amount').value);
  const date  = document.getElementById(isIncome ? 'i-date' : 'e-date').value;
  const desc  = document.getElementById(isIncome ? 'i-desc' : 'e-desc').value.trim();

  if(!amount || amount <= 0) { showToast('Ingresa un monto válido'); return; }
  if(!date)  { showToast('Selecciona una fecha'); return; }

  const data = getData();
  data.push({ id: Date.now(), type, cat, amount, date, desc });
  saveData(data);

  document.getElementById(isIncome ? 'i-amount' : 'e-amount').value = '';
  document.getElementById(isIncome ? 'i-desc' : 'e-desc').value = '';
  showToast(isIncome ? 'Ingreso guardado ✓' : 'Gasto guardado ✓');
}

// ---------- DELETE ----------
function deleteItem(id) {
  if(!confirm('¿Eliminar este registro?')) return;
  saveData(getData().filter(x => x.id != id));
  renderResumen(); renderHistorial();
  if(document.getElementById('page-graficos').classList.contains('active')) renderCharts();
  showToast('Registro eliminado');
}

// ---------- TX ITEM HTML ----------
function txHTML(x) {
  return `<div class="tx-item">
    <div class="tx-dot ${x.type}"></div>
    <div class="tx-info">
      <div class="tx-cat">${x.cat}</div>
      ${x.desc ? `<div class="tx-desc">${x.desc}</div>` : ''}
    </div>
    <div class="tx-date">${fmtDate(x.date)}</div>
    <div class="tx-amount ${x.type}">${x.type==='income'?'+':'-'}${fmt(x.amount)}</div>
    <button class="tx-del" onclick="deleteItem(${x.id})" title="Eliminar">✕</button>
  </div>`;
}

// ---------- RESUMEN ----------
function renderResumen() {
  const month = document.getElementById('resumen-month').value;
  const data  = getData().filter(x => x.date.startsWith(month));
  const inc   = data.filter(x => x.type==='income').reduce((s,x) => s+x.amount, 0);
  const exp   = data.filter(x => x.type==='expense').reduce((s,x) => s+x.amount, 0);
  document.getElementById('r-ingresos').textContent = fmt(inc);
  document.getElementById('r-gastos').textContent   = fmt(exp);
  const bal = document.getElementById('r-balance');
  bal.textContent = fmt(inc - exp);
  bal.className   = 'card-value ' + (inc-exp >= 0 ? 'green' : 'red');

  const recent = [...data].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 8);
  const el = document.getElementById('recent-list');
  el.innerHTML = recent.length ? recent.map(txHTML).join('') : '<div class="empty">Sin movimientos este mes</div>';
}

// ---------- HISTORIAL ----------
let currentFilter = 'all';
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHistorial();
}
function renderHistorial() {
  const month = document.getElementById('hist-month').value;
  let data = getData().filter(x => x.date.startsWith(month));
  if(currentFilter !== 'all') data = data.filter(x => x.type === currentFilter);
  data.sort((a,b) => b.date.localeCompare(a.date));
  const el = document.getElementById('hist-list');
  el.innerHTML = data.length ? data.map(txHTML).join('') : '<div class="empty">Sin registros</div>';
}

// ---------- CHARTS ----------
let charts = {};
const INCOME_COLORS = ['#22d3a5','#6ee7c8','#0fa87e','#34d399','#5eead4','#a7f3d0'];
const EXPENSE_COLORS = ['#ff6b6b','#fca5a5','#ef4444','#f87171','#fb923c','#fbbf24','#f472b6','#c084fc','#a78bfa'];

function buildCatChart(canvasId, data, type, colors) {
  const cats = {};
  data.filter(x => x.type === type).forEach(x => { cats[x.cat] = (cats[x.cat]||0) + x.amount; });
  if(charts[canvasId]) charts[canvasId].destroy();
  if(!Object.keys(cats).length) {
    const ctx = document.getElementById(canvasId).getContext('2d');
    ctx.clearRect(0,0,999,999);
    ctx.fillStyle = '#7b82a8'; ctx.font = '14px DM Sans'; ctx.textAlign = 'center';
    ctx.fillText('Sin datos', document.getElementById(canvasId).width/2, 100);
    return;
  }
  charts[canvasId] = new Chart(document.getElementById(canvasId), {
    type: 'doughnut',
    data: { labels: Object.keys(cats), datasets: [{ data: Object.values(cats), backgroundColor: colors, borderWidth: 0 }] },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position:'bottom', labels: { color:'#7b82a8', font:{size:11}, boxWidth:10, padding:12 } } }
    }
  });
}

function buildCompareChart(month) {
  const data = getData().filter(x => x.date.startsWith(month));
  const incCats = ['Viaje','Viáticos','Propinas','PC','Salario','Otros Ingresos'];
  const expCats = ['Alimentación','Transporte','Combustible','Facturas','Colegio','Niñera','Vestimenta','Salidas','Otros Gastos'];
  
  const incTotals = incCats.map(c => data.filter(x=>x.type==='income'&&x.cat===c).reduce((s,x)=>s+x.amount,0));
  const expTotals = expCats.map(c => data.filter(x=>x.type==='expense'&&x.cat===c).reduce((s,x)=>s+x.amount,0));

  // Show simple bar: total income vs expense
  const inc = data.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
  const exp = data.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);

  if(charts['chart-compare']) charts['chart-compare'].destroy();
  charts['chart-compare'] = new Chart(document.getElementById('chart-compare'), {
    type: 'bar',
    data: {
      labels: [...incCats, ...expCats],
      datasets: [
        { label: 'Ingresos', data: [...incTotals, ...new Array(expCats.length).fill(0)], backgroundColor: '#22d3a580', borderColor: '#22d3a5', borderWidth: 1 },
        { label: 'Gastos',   data: [...new Array(incCats.length).fill(0), ...expTotals], backgroundColor: '#ff6b6b80', borderColor: '#ff6b6b', borderWidth: 1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color:'#7b82a8', font:{size:12} } } },
      scales: {
        x: { ticks: { color:'#7b82a8', font:{size:10} }, grid: { color:'#2e3250' } },
        y: { ticks: { color:'#7b82a8', callback: v => '$'+v }, grid: { color:'#2e3250' } }
      }
    }
  });
}

function renderCharts() {
  const month = document.getElementById('chart-month').value;
  const data  = getData().filter(x => x.date.startsWith(month));
  buildCatChart('chart-income',  data, 'income',  INCOME_COLORS);
  buildCatChart('chart-expense', data, 'expense', EXPENSE_COLORS);
  buildCompareChart(month);
}

// ---------- TOAST ----------
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
renderResumen();
</script>
</body>
</html>
