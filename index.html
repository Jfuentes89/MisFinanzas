<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mis Finanzas</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
  /* ===== DARK THEME (default) ===== */
  [data-theme="dark"] {
    --bg:       #0b1214;
    --surface:  #111d1f;
    --surface2: #172325;
    --border:   #1f3235;
    --text:     #eef6f6;
    --muted:    #5e8080;
    --accent:   #22BABB;
    --accent2:  #9EF8EE;
    --income:   #22BABB;
    --income2:  #348888;
    --expense:  #FA7F08;
    --expense2: #F24405;
    --positive: #22BABB;
    --negative: #F24405;
    --hero-grad: linear-gradient(135deg, #111d1f 0%, #0d1a1c 100%);
    --glow:     #22BABB22;
    --card-bg:  #111d1f;
    --nav-bg:   #0d1a1c;
    --input-bg: #172325;
  }

  /* ===== LIGHT THEME ===== */
  [data-theme="light"] {
    --bg:       #f0fafa;
    --surface:  #ffffff;
    --surface2: #e8f5f5;
    --border:   #c8e8e8;
    --text:     #0d2020;
    --muted:    #348888;
    --accent:   #22BABB;
    --accent2:  #348888;
    --income:   #22BABB;
    --income2:  #348888;
    --expense:  #FA7F08;
    --expense2: #F24405;
    --positive: #22BABB;
    --negative: #F24405;
    --hero-grad: linear-gradient(135deg, #d4f5f5 0%, #c0eeee 100%);
    --glow:     #22BABB18;
    --card-bg:  #ffffff;
    --nav-bg:   #ffffff;
    --input-bg: #e8f5f5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex; flex-direction: column;
    max-width: 480px; margin: 0 auto;
    transition: background .3s, color .3s;
  }

  /* ===== TOP BAR ===== */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: max(14px, env(safe-area-inset-top)) 18px 10px;
    background: var(--bg); flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    transition: background .3s, border-color .3s;
  }
  .topbar-left { display: flex; flex-direction: column; }
  .topbar-app { font-family: 'Barlow Condensed', sans-serif; font-size: 1.25rem; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }

  /* Month pill */
  .month-pill {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 10px;
    display: flex; align-items: center; gap: 4px;
    font-size: 0.75rem; color: var(--muted); transition: background .3s, border-color .3s;
  }
  .month-pill input[type="month"] {
    background: none; border: none; color: var(--muted);
    font-family: 'Barlow', sans-serif; font-size: 0.75rem;
    outline: none; cursor: pointer; width: 108px;
  }

  /* Theme toggle */
  .theme-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 1rem; transition: background .3s, border-color .3s;
  }

  /* ===== PAGES ===== */
  .pages-wrap { flex: 1; overflow: hidden; position: relative; }
  .page {
    display: none; position: absolute; inset: 0;
    overflow-y: auto; padding: 14px 16px calc(74px + env(safe-area-inset-bottom) + 8px);
    -webkit-overflow-scrolling: touch;
  }
  .page.active { display: block; }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    display: flex; align-items: center;
    background: var(--nav-bg); border-top: 1px solid var(--border);
    height: calc(62px + env(safe-area-inset-bottom));
    padding-bottom: env(safe-area-inset-bottom);
    flex-shrink: 0; z-index: 100;
    transition: background .3s, border-color .3s;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 10px 0; cursor: pointer; background: none; border: none;
    color: var(--muted); font-family: 'Barlow', sans-serif;
    font-size: 0.6rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    transition: color .2s;
  }
  .nav-item svg { width: 21px; height: 21px; stroke: currentColor; fill: none; stroke-width: 1.8; transition: stroke .2s; }
  .nav-item.active { color: var(--accent); }

  /* ===== PAGE HEADING ===== */
  .page-heading {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.7rem; font-weight: 900; text-transform: uppercase;
    letter-spacing: .04em; margin-bottom: 14px; color: var(--text);
  }

  /* ===== BALANCE HERO ===== */
  .balance-hero {
    background: var(--hero-grad);
    border: 1px solid var(--border); border-radius: 18px;
    padding: 20px; margin-bottom: 12px;
    position: relative; overflow: hidden;
    transition: background .3s, border-color .3s;
  }
  .balance-hero::before {
    content: ''; position: absolute; top: -50px; right: -50px;
    width: 140px; height: 140px; border-radius: 50%;
    background: radial-gradient(circle, var(--glow), transparent 70%);
  }
  .balance-hero-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 6px; font-weight: 700; }
  .balance-hero-value { font-family: 'Barlow Condensed', sans-serif; font-size: 2.8rem; font-weight: 900; line-height: 1; }
  .balance-hero-value.pos { color: var(--positive); }
  .balance-hero-value.neg { color: var(--negative); }
  .balance-hero-sub { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }

  /* ===== MINI CARDS ===== */
  .balance-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .mini-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px;
    position: relative; overflow: hidden;
    transition: background .3s, border-color .3s;
  }
  .mini-card::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 3px 3px 0 0;
  }
  .mini-card.inc::after { background: linear-gradient(90deg, var(--income2), var(--income)); }
  .mini-card.exp::after { background: linear-gradient(90deg, var(--expense2), var(--expense)); }
  .mini-card-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; font-weight: 700; }
  .mini-card-value { font-family: 'Barlow Condensed', sans-serif; font-size: 1.45rem; font-weight: 700; }
  .mini-card.inc .mini-card-value { color: var(--income); }
  .mini-card.exp .mini-card-value { color: var(--expense); }

  /* ===== SECTION LABEL ===== */
  .section-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 12px; }

  /* ===== TX ITEMS ===== */
  .tx-list { display: flex; flex-direction: column; gap: 8px; }
  .tx-item {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 13px 14px;
    display: flex; align-items: center; gap: 12px;
    animation: fadeUp .2s ease;
    transition: background .3s, border-color .3s;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  .tx-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }
  .tx-icon.income { background: #22BABB18; }
  .tx-icon.expense { background: #FA7F0818; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-cat { font-size: 0.87rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-desc { font-size: 0.71rem; color: var(--muted); margin-top: 2px; }
  .tx-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .tx-amount { font-family: 'Barlow Condensed', sans-serif; font-size: 1.05rem; font-weight: 700; }
  .tx-amount.income { color: var(--income); }
  .tx-amount.expense { color: var(--expense); }
  .tx-meta { display: flex; align-items: center; gap: 6px; }
  .tx-date { font-size: 0.66rem; color: var(--muted); }
  .tx-del { background: none; border: none; color: var(--border); font-size: 0.8rem; cursor: pointer; padding: 2px 4px; line-height: 1; transition: color .15s; }
  .tx-del:active { color: var(--expense2); }
  .empty { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 40px 20px; }

  /* ===== REGISTRAR TABS ===== */
  .form-tabs {
    display: flex; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 4px; margin-bottom: 18px; gap: 4px;
    transition: background .3s, border-color .3s;
  }
  .form-tab {
    flex: 1; text-align: center; padding: 10px; border-radius: 9px;
    font-size: 0.8rem; font-weight: 700; cursor: pointer;
    border: none; background: none; color: var(--muted);
    transition: all .2s; text-transform: uppercase; letter-spacing: .05em;
    font-family: 'Barlow', sans-serif;
  }
  .form-tab.active.income { background: #22BABB22; color: var(--income); }
  .form-tab.active.expense { background: #FA7F0822; color: var(--expense); }

  .form-section { display: none; }
  .form-section.active { display: block; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; font-weight: 700; }

  select, input[type="number"], input[type="text"], input[type="date"] {
    width: 100%; background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 13px 14px;
    font-family: 'Barlow', sans-serif; font-size: 0.95rem; outline: none;
    -webkit-appearance: none; appearance: none; transition: border-color .2s, background .3s;
  }
  select:focus, input:focus { border-color: var(--accent); }
  select option { background: var(--surface2); color: var(--text); }

  .amount-wrap { position: relative; }
  .amount-prefix { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-weight: 700; font-size: 1.3rem; pointer-events: none; }
  .amount-wrap input { padding-left: 28px; font-family: 'Barlow Condensed', sans-serif; font-size: 1.7rem; font-weight: 700; }

  .btn-save {
    width: 100%; padding: 15px; border: none; border-radius: 12px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem;
    font-weight: 900; letter-spacing: .08em; text-transform: uppercase;
    cursor: pointer; margin-top: 6px; transition: opacity .15s, transform .1s;
  }
  .btn-save:active { opacity: .85; transform: scale(.98); }
  .btn-save.income { background: linear-gradient(135deg, var(--income2), var(--income)); color: #fff; }
  .btn-save.expense { background: linear-gradient(135deg, var(--expense2), var(--expense)); color: #fff; }

  /* ===== FILTER CHIPS ===== */
  .filter-chips { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
  .filter-chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; padding: 6px 16px; border-radius: 20px;
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
    cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--muted);
    transition: all .2s;
  }
  .chip.active { border-color: var(--accent); background: #22BABB15; color: var(--accent); }
  .chip.inc.active { border-color: var(--income); background: #22BABB15; color: var(--income); }
  .chip.exp.active { border-color: var(--expense); background: #FA7F0815; color: var(--expense); }

  /* ===== CHARTS ===== */
  .chart-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; margin-bottom: 14px;
    transition: background .3s, border-color .3s;
  }
  .chart-card-title { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 14px; }
  .chart-wrap { position: relative; height: 200px; }

  /* ===== TOAST ===== */
  #toast {
    position: fixed; bottom: calc(70px + env(safe-area-inset-bottom) + 12px); left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--accent); color: #fff;
    padding: 10px 22px; border-radius: 20px;
    font-size: 0.82rem; font-weight: 700; white-space: nowrap;
    opacity: 0; transition: all .25s; pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-app">MisFinanzas</div>
  </div>
  <div class="topbar-right">
    <div class="month-pill">
      📅 <input type="month" id="global-month" onchange="onMonthChange()">
    </div>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn" title="Cambiar tema">🌙</button>
  </div>
</div>

<!-- PAGES -->
<div class="pages-wrap">

  <!-- INICIO -->
  <div id="page-inicio" class="page active">
    <div class="page-heading">Dashboard</div>
    <div class="balance-hero">
      <div class="balance-hero-label">Balance del Mes</div>
      <div class="balance-hero-value pos" id="d-balance">$0.00</div>
      <div class="balance-hero-sub" id="d-sub">Sin movimientos aún</div>
    </div>
    <div class="balance-row">
      <div class="mini-card inc">
        <div class="mini-card-label">Ingresos</div>
        <div class="mini-card-value" id="d-inc">$0.00</div>
      </div>
      <div class="mini-card exp">
        <div class="mini-card-label">Gastos</div>
        <div class="mini-card-value" id="d-exp">$0.00</div>
      </div>
    </div>
    <div class="section-label">Actividad Reciente</div>
    <div class="tx-list" id="d-list"></div>
  </div>

  <!-- REGISTRAR -->
  <div id="page-registrar" class="page">
    <div class="page-heading">Registrar</div>
    <div class="form-tabs">
      <button class="form-tab active income" onclick="switchTab('income',this)">+ Ingreso</button>
      <button class="form-tab expense" onclick="switchTab('expense',this)">– Gasto</button>
    </div>

    <!-- INGRESO -->
    <div class="form-section active" id="fs-income">
      <div class="form-group">
        <label>Monto</label>
        <div class="amount-wrap"><span class="amount-prefix">$</span>
          <input type="number" id="i-amount" placeholder="0.00" min="0" step="0.01" inputmode="decimal">
        </div>
      </div>
      <div class="form-group">
        <label>Categoría</label>
        <select id="i-cat">
          <option value="Viaje">✈️  Ingreso de Viaje</option>
          <option value="Viáticos">🧾  Viáticos</option>
          <option value="Propinas">💵  Propinas</option>
          <option value="PC">💻  Ingresos de PC</option>
          <option value="Salario">💼  Salario</option>
          <option value="Otros Ingresos">➕  Otros Ingresos</option>
        </select>
      </div>
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="i-date">
      </div>
      <div class="form-group">
        <label>Descripción (opcional)</label>
        <input type="text" id="i-desc" placeholder="Ej: pago semana 1">
      </div>
      <button class="btn-save income" onclick="saveTransaction('income')">Guardar Ingreso</button>
    </div>

    <!-- GASTO -->
    <div class="form-section" id="fs-expense">
      <div class="form-group">
        <label>Monto</label>
        <div class="amount-wrap"><span class="amount-prefix">$</span>
          <input type="number" id="e-amount" placeholder="0.00" min="0" step="0.01" inputmode="decimal">
        </div>
      </div>
      <div class="form-group">
        <label>Categoría</label>
        <select id="e-cat">
          <option value="Alimentación">🛒  Alimentación del Hogar</option>
          <option value="Transporte">🚌  Transporte</option>
          <option value="Combustible">⛽  Combustible</option>
          <option value="Facturas">📄  Facturas / Servicios</option>
          <option value="Colegio">🎒  Colegio</option>
          <option value="Niñera">👶  Niñera</option>
          <option value="Vestimenta">👕  Vestimenta</option>
          <option value="Salidas">🎉  Salidas / Entretenimiento</option>
          <option value="Otros Gastos">➖  Otros Gastos</option>
        </select>
      </div>
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="e-date">
      </div>
      <div class="form-group">
        <label>Descripción (opcional)</label>
        <input type="text" id="e-desc" placeholder="Ej: compra supermercado">
      </div>
      <button class="btn-save expense" onclick="saveTransaction('expense')">Guardar Gasto</button>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div id="page-historial" class="page">
    <div class="page-heading">Historial</div>
    <div class="filter-chips">
      <div class="chip active" onclick="setFilter('all',this)">Todos</div>
      <div class="chip inc" onclick="setFilter('income',this)">Ingresos</div>
      <div class="chip exp" onclick="setFilter('expense',this)">Gastos</div>
    </div>
    <div class="tx-list" id="h-list"></div>
  </div>

  <!-- STATS -->
  <div id="page-stats" class="page">
    <div class="page-heading">Estadísticas</div>
    <div class="chart-card">
      <div class="chart-card-title">Ingresos por Categoría</div>
      <div class="chart-wrap"><canvas id="c-inc"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">Gastos por Categoría</div>
      <div class="chart-wrap"><canvas id="c-exp"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">Ingresos vs Gastos</div>
      <div class="chart-wrap"><canvas id="c-bar"></canvas></div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="showPage('inicio',this)">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Inicio
  </button>
  <button class="nav-item" onclick="showPage('registrar',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Registrar
  </button>
  <button class="nav-item" onclick="showPage('historial',this)">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Historial
  </button>
  <button class="nav-item" onclick="showPage('stats',this)">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Stats
  </button>
</nav>

<div id="toast"></div>

<script>
// ===== DATA =====
const getData = () => JSON.parse(localStorage.getItem('mf_data') || '[]');
const saveData = d => localStorage.setItem('mf_data', JSON.stringify(d));
const fmt = n => '$' + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
const fmtDate = d => { const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; };
const todayStr = () => new Date().toISOString().slice(0,10);
const thisMonth = () => new Date().toISOString().slice(0,7);
const getMonth = () => document.getElementById('global-month').value;

const catIcon = {
  'Viaje':'✈️','Viáticos':'🧾','Propinas':'💵','PC':'💻','Salario':'💼','Otros Ingresos':'➕',
  'Alimentación':'🛒','Transporte':'🚌','Combustible':'⛽','Facturas':'📄','Colegio':'🎒',
  'Niñera':'👶','Vestimenta':'👕','Salidas':'🎉','Otros Gastos':'➖'
};

// ===== THEME =====
let isDark = localStorage.getItem('mf_theme') !== 'light';
function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('mf_theme', isDark ? 'dark' : 'light');
  // Redraw charts with new colors
  if(document.getElementById('page-stats').classList.contains('active')) renderCharts();
}
function toggleTheme() { isDark = !isDark; applyTheme(); }

// ===== INIT =====
if(localStorage.getItem('mf_theme') === 'light') isDark = false;
applyTheme();
document.getElementById('global-month').value = thisMonth();
document.getElementById('i-date').value = todayStr();
document.getElementById('e-date').value = todayStr();

function onMonthChange() { renderDashboard(); renderHistorial(); renderCharts(); }

// ===== NAV =====
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(id==='inicio') renderDashboard();
  if(id==='historial') renderHistorial();
  if(id==='stats') renderCharts();
}

// ===== FORM TABS =====
function switchTab(type, btn) {
  document.querySelectorAll('.form-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(s=>s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('fs-'+type).classList.add('active');
}

// ===== TX HTML =====
function txHTML(x) {
  return `<div class="tx-item">
    <div class="tx-icon ${x.type}">${catIcon[x.cat]||'💰'}</div>
    <div class="tx-info">
      <div class="tx-cat">${x.cat}</div>
      ${x.desc?`<div class="tx-desc">${x.desc}</div>`:''}
    </div>
    <div class="tx-right">
      <div class="tx-amount ${x.type}">${x.type==='income'?'+':'-'}${fmt(x.amount)}</div>
      <div class="tx-meta">
        <span class="tx-date">${fmtDate(x.date)}</span>
        <button class="tx-del" onclick="delItem(${x.id})">✕</button>
      </div>
    </div>
  </div>`;
}

// ===== SAVE =====
function saveTransaction(type) {
  const isI = type==='income';
  const amount = parseFloat(document.getElementById(isI?'i-amount':'e-amount').value);
  const cat    = document.getElementById(isI?'i-cat':'e-cat').value;
  const date   = document.getElementById(isI?'i-date':'e-date').value;
  const desc   = document.getElementById(isI?'i-desc':'e-desc').value.trim();
  if(!amount||amount<=0) { showToast('⚠️ Ingresa un monto válido'); return; }
  if(!date) { showToast('⚠️ Selecciona una fecha'); return; }
  const data = getData();
  data.push({ id: Date.now(), type, cat, amount, date, desc });
  saveData(data);
  document.getElementById(isI?'i-amount':'e-amount').value = '';
  document.getElementById(isI?'i-desc':'e-desc').value = '';
  showToast(isI ? '✓ Ingreso guardado' : '✓ Gasto guardado');
}

// ===== DELETE =====
function delItem(id) {
  if(!confirm('¿Eliminar este registro?')) return;
  saveData(getData().filter(x=>x.id!=id));
  renderDashboard(); renderHistorial();
  showToast('Registro eliminado');
}

// ===== DASHBOARD =====
function renderDashboard() {
  const m = getMonth();
  const data = getData().filter(x=>x.date.startsWith(m));
  const inc = data.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
  const exp = data.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
  const bal = inc - exp;
  document.getElementById('d-inc').textContent = fmt(inc);
  document.getElementById('d-exp').textContent = fmt(exp);
  const bEl = document.getElementById('d-balance');
  bEl.textContent = (bal < 0 ? '-' : '') + fmt(Math.abs(bal));
  bEl.className = 'balance-hero-value ' + (bal >= 0 ? 'pos' : 'neg');
  document.getElementById('d-sub').textContent = data.length
    ? `${data.length} movimiento${data.length!==1?'s':''} este mes`
    : 'Sin movimientos aún';
  const recent = [...data].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  document.getElementById('d-list').innerHTML = recent.length
    ? recent.map(txHTML).join('')
    : '<div class="empty">Sin movimientos este mes</div>';
}

// ===== HISTORIAL =====
let hFilter = 'all';
function setFilter(f, el) {
  hFilter = f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderHistorial();
}
function renderHistorial() {
  const m = getMonth();
  let data = getData().filter(x=>x.date.startsWith(m));
  if(hFilter!=='all') data = data.filter(x=>x.type===hFilter);
  data.sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('h-list').innerHTML = data.length
    ? data.map(txHTML).join('')
    : '<div class="empty">Sin registros este mes</div>';
}

// ===== CHARTS =====
let charts = {};

function getMutedColor() {
  return isDark ? '#5e8080' : '#348888';
}
function getGridColor() {
  return isDark ? '#1f3235' : '#c8e8e8';
}

const CINC = ['#22BABB','#348888','#9EF8EE','#6dd8d8','#45c8c8','#1a9090'];
const CEXP = ['#FA7F08','#F24405','#ffaa44','#ff6622','#ffc070','#cc3300'];

function doughnut(id, cats, colors) {
  if(charts[id]) { charts[id].destroy(); delete charts[id]; }
  const labels=Object.keys(cats), vals=Object.values(cats);
  const ctx = document.getElementById(id).getContext('2d');
  if(!labels.length) {
    ctx.clearRect(0,0,600,400);
    ctx.fillStyle = getMutedColor();
    ctx.font = '14px Barlow'; ctx.textAlign = 'center';
    ctx.fillText('Sin datos este mes', ctx.canvas.width/2, 100); return;
  }
  charts[id] = new Chart(ctx, {
    type:'doughnut',
    data:{ labels, datasets:[{ data:vals, backgroundColor:colors, borderWidth:0 }] },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'bottom', labels:{ color: getMutedColor(), font:{size:10,family:'Barlow'}, boxWidth:10, padding:8 } } }
    }
  });
}

function renderCharts() {
  const m = getMonth();
  const data = getData().filter(x=>x.date.startsWith(m));
  const incCats={}, expCats={};
  data.filter(x=>x.type==='income').forEach(x=>{ incCats[x.cat]=(incCats[x.cat]||0)+x.amount; });
  data.filter(x=>x.type==='expense').forEach(x=>{ expCats[x.cat]=(expCats[x.cat]||0)+x.amount; });
  doughnut('c-inc', incCats, CINC);
  doughnut('c-exp', expCats, CEXP);

  const incCatList=['Viaje','Viáticos','Propinas','PC','Salario','Otros Ingresos'];
  const expCatList=['Alimentación','Transporte','Combustible','Facturas','Colegio','Niñera','Vestimenta','Salidas','Otros Gastos'];
  const allCats=[...incCatList,...expCatList];
  const incVals=allCats.map(c=>data.filter(x=>x.type==='income'&&x.cat===c).reduce((s,x)=>s+x.amount,0));
  const expVals=allCats.map(c=>data.filter(x=>x.type==='expense'&&x.cat===c).reduce((s,x)=>s+x.amount,0));

  if(charts['c-bar']) { charts['c-bar'].destroy(); delete charts['c-bar']; }
  charts['c-bar'] = new Chart(document.getElementById('c-bar'), {
    type:'bar',
    data:{ labels: allCats,
      datasets:[
        { label:'Ingresos', data:incVals, backgroundColor:'#22BABB55', borderColor:'#22BABB', borderWidth:1.5, borderRadius:4 },
        { label:'Gastos',   data:expVals, backgroundColor:'#FA7F0855', borderColor:'#FA7F08', borderWidth:1.5, borderRadius:4 }
      ]
    },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color: getMutedColor(), font:{size:10,family:'Barlow'}, boxWidth:10 } } },
      scales:{
        x:{ ticks:{ color: getMutedColor(), font:{size:8}, maxRotation:50 }, grid:{ color: getGridColor() } },
        y:{ ticks:{ color: getMutedColor(), callback:v=>'$'+v }, grid:{ color: getGridColor() } }
      }
    }
  });
}

// ===== TOAST =====
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

renderDashboard();
</script>
</body>
</html>
